<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNSオートパイロット | Instagram・TikTok・Pinterest投稿自動生成ツール</title>
<meta name="description" content="ブログ記事からInstagram、TikTok、Pinterest向けのSNS投稿コンテンツを自動生成。30日分の一括生成も可能。">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6327505164684489" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--surface:#1a1a24;--surface2:#222233;--surface3:#2a2a3d;
  --text:#e8e8f0;--text2:#a0a0b8;--text3:#6a6a82;
  --accent:#7c5cfc;--accent2:#a78bfa;--accent-glow:rgba(124,92,252,.15);
  --pink:#f472b6;--orange:#fb923c;--green:#4ade80;--blue:#60a5fa;--red:#f87171;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* Header */
.header{background:linear-gradient(135deg,#1a1028,#0f0f13);border-bottom:1px solid rgba(124,92,252,.15);padding:20px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo small{font-size:.7rem;display:block;-webkit-text-fill-color:var(--text3);font-weight:400}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 20px;border-radius:20px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:.85rem;transition:all .2s}
.nav-tab:hover{background:var(--surface2);color:var(--text)}
.nav-tab.active{background:var(--accent);color:#fff}

/* Sections */
.section{display:none;padding:30px 0}
.section.active{display:block}

/* Generator Section */
.gen-controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.select-wrap{position:relative}
.select-wrap select{appearance:none;background:var(--surface2);border:1px solid rgba(124,92,252,.2);color:var(--text);padding:10px 40px 10px 16px;border-radius:var(--radius-sm);font-size:.9rem;cursor:pointer;min-width:200px}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.btn{padding:10px 24px;border-radius:var(--radius-sm);border:none;font-size:.9rem;cursor:pointer;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6246ea);color:#fff;box-shadow:0 4px 16px rgba(124,92,252,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,92,252,.4)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid rgba(124,92,252,.2)}
.btn-secondary:hover{background:var(--surface3)}
.btn-pink{background:linear-gradient(135deg,var(--pink),#e11d48);color:#fff}
.btn-green{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.btn-sm{padding:6px 14px;font-size:.8rem}

/* Post Cards */
.posts-grid{display:grid;gap:20px}
.post-card{background:var(--surface);border:1px solid rgba(124,92,252,.1);border-radius:var(--radius);overflow:hidden;transition:all .2s}
.post-card:hover{border-color:rgba(124,92,252,.3);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.post-card-inner{display:grid;grid-template-columns:320px 1fr;gap:0}
@media(max-width:768px){.post-card-inner{grid-template-columns:1fr}}
.post-image-area{background:var(--surface2);min-height:320px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.post-content-area{padding:20px;display:flex;flex-direction:column;gap:12px}
.post-platform{display:flex;gap:6px;align-items:center}
.platform-badge{padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600}
.badge-ig{background:linear-gradient(135deg,#833AB4,#E1306C,#F77737);color:#fff}
.badge-tt{background:#000;color:#fff;border:1px solid #333}
.badge-pin{background:#e60023;color:#fff}
.post-caption{font-size:.9rem;color:var(--text);line-height:1.8;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.post-hashtags{font-size:.8rem;color:var(--accent2);line-height:1.8}
.post-link{font-size:.8rem;color:var(--blue);word-break:break-all}
.post-actions{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap}
.post-tiktok{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-top:8px}
.post-tiktok-label{font-size:.75rem;color:var(--text3);margin-bottom:4px}
.post-tiktok-script{font-size:.85rem;color:var(--text2);line-height:1.8}

/* Image Card (screenshot-ready) */
.sns-card{width:320px;height:320px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px;text-align:center;position:relative;overflow:hidden}
.sns-card-bg{position:absolute;inset:0;z-index:0}
.sns-card-content{position:relative;z-index:1}
.sns-card-emoji{font-size:3rem;margin-bottom:16px}
.sns-card-title{font-size:1.3rem;font-weight:700;color:#fff;line-height:1.6;margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.sns-card-subtitle{font-size:.85rem;color:rgba(255,255,255,.8);line-height:1.6}
.sns-card-brand{position:absolute;bottom:12px;right:16px;font-size:.65rem;color:rgba(255,255,255,.5);z-index:1}

/* Calendar Section */
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.calendar-month{font-size:1.2rem;font-weight:600}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-header{text-align:center;font-size:.75rem;color:var(--text3);padding:8px}
.cal-day{background:var(--surface);border:1px solid rgba(124,92,252,.08);border-radius:var(--radius-sm);padding:8px;min-height:100px;cursor:pointer;transition:all .2s}
.cal-day:hover{border-color:rgba(124,92,252,.3)}
.cal-day.empty{background:transparent;border-color:transparent}
.cal-day-num{font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.cal-day-post{font-size:.7rem;color:var(--text3);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.cal-day-platform{margin-top:4px}
.cal-badge{display:inline-block;width:18px;height:18px;border-radius:50%;font-size:.55rem;line-height:18px;text-align:center;color:#fff;font-weight:700}
.cal-badge-ig{background:linear-gradient(135deg,#833AB4,#E1306C)}
.cal-badge-tt{background:#000;border:1px solid #444}
.cal-badge-pin{background:#e60023}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:#000;padding:12px 28px;border-radius:var(--radius);font-size:.9rem;font-weight:600;transition:transform .3s ease;z-index:1000}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Stats bar */
.stats-bar{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid rgba(124,92,252,.1);border-radius:var(--radius-sm);padding:16px 24px;flex:1;min-width:150px}
.stat-num{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.75rem;color:var(--text3);margin-top:2px}

/* Ad space */
.ad-space{margin:20px 0;text-align:center;min-height:90px}

/* Responsive */
@media(max-width:600px){
  .header-inner{flex-direction:column;gap:12px}
  .gen-controls{flex-direction:column}
  .select-wrap select{width:100%}
  .calendar-grid{grid-template-columns:repeat(7,1fr)}
  .cal-day{min-height:60px;padding:4px}
  .cal-day-post{display:none}
  .stats-bar{flex-direction:column}
  .meigen-slides-grid{grid-template-columns:repeat(2,1fr)}
}

/* TikTok Meigen Slides */
.meigen-set{background:var(--surface);border:1px solid rgba(124,92,252,.1);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.meigen-set-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.meigen-set-title{font-size:1.1rem;font-weight:700;color:var(--accent2)}
.meigen-slides-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.meigen-slide{aspect-ratio:9/16;background:linear-gradient(135deg,#1a1028,#0f0f13);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;position:relative;border:1px solid rgba(124,92,252,.15);overflow:hidden;transition:transform .2s}
.meigen-slide:hover{transform:scale(1.02)}
.meigen-slide-num{position:absolute;top:8px;right:10px;font-size:.65rem;color:rgba(255,255,255,.5);background:rgba(0,0,0,.4);padding:2px 8px;border-radius:10px}
.meigen-slide-quote{font-size:.82rem;font-weight:500;color:#fff;line-height:1.7;margin-bottom:10px;font-family:'Yu Mincho','Hiragino Mincho Pro',serif}
.meigen-slide-person{font-size:.7rem;color:rgba(255,255,255,.6)}
.meigen-slide-title-text{font-size:1rem;font-weight:700;color:#fff;line-height:1.6;font-family:'Yu Mincho','Hiragino Mincho Pro',serif}
.meigen-slide-sub{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:8px}
.meigen-slide-icon{font-size:2rem;margin-bottom:10px}
.meigen-slide-cta{font-size:.85rem;font-weight:600;color:#fff;line-height:1.6}
.meigen-slide-account{font-size:.75rem;color:var(--accent2);margin-top:6px}
.meigen-prompt-block{background:var(--surface2);border:1px solid rgba(124,92,252,.1);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;position:relative}
.meigen-prompt-label{font-size:.8rem;font-weight:600;color:var(--accent2);margin-bottom:8px}
.meigen-prompt-text{font-size:.8rem;color:var(--text2);line-height:1.8;white-space:pre-wrap;max-height:300px;overflow-y:auto;font-family:monospace}
.meigen-copy-btn{position:absolute;top:10px;right:10px}

/* PNG Download */
.meigen-dl-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.meigen-dl-bar .btn{font-size:.85rem}
.meigen-progress{font-size:.8rem;color:var(--accent2);font-weight:600;margin-left:8px;display:none}
.meigen-individual-dl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.meigen-individual-dl .btn{font-size:.75rem;padding:4px 10px}

/* Hidden render container for 1080x1920 slides */
.meigen-render-container{position:absolute;left:-99999px;top:0;pointer-events:none;overflow:hidden}
.meigen-render-slide{width:1080px;height:1920px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;font-family:'Shippori Mincho','Yu Mincho','Hiragino Mincho Pro',serif}
.meigen-render-slide *{font-family:inherit}
.mrs-border{position:absolute;inset:40px;border:1px solid rgba(255,255,255,.12);border-radius:8px;pointer-events:none}
.mrs-sparkle{position:absolute;color:rgba(255,255,255,.08);font-size:24px;pointer-events:none}
.mrs-sparkle.s1{top:60px;left:60px}.mrs-sparkle.s2{top:60px;right:60px}.mrs-sparkle.s3{bottom:60px;left:60px}.mrs-sparkle.s4{bottom:60px;right:60px}
.mrs-sparkle.s5{top:50%;left:50px}.mrs-sparkle.s6{top:50%;right:50px}
.mrs-num{position:absolute;top:56px;right:56px;width:72px;height:72px;border-radius:50%;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,.7);font-weight:600;border:1px solid rgba(255,255,255,.15)}
.mrs-quote-open{position:absolute;top:280px;left:80px;font-size:200px;color:rgba(255,255,255,.04);line-height:1;font-family:serif}
.mrs-quote-close{position:absolute;bottom:280px;right:80px;font-size:200px;color:rgba(255,255,255,.04);line-height:1;font-family:serif}
.mrs-quote-text{font-size:58px;font-weight:500;color:#fff;line-height:1.8;padding:0 100px;max-width:960px;text-shadow:0 2px 16px rgba(0,0,0,.4);letter-spacing:2px}
.mrs-person{font-size:34px;color:#c9a96e;margin-top:48px;letter-spacing:4px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.mrs-icon{font-size:140px;margin-bottom:40px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.3))}
.mrs-title{font-size:64px;font-weight:700;color:#fff;line-height:1.6;text-shadow:0 3px 16px rgba(0,0,0,.4);padding:0 80px;letter-spacing:3px}
.mrs-subtitle{font-size:32px;color:rgba(255,255,255,.6);margin-top:32px;letter-spacing:6px}
.mrs-cta{font-size:56px;font-weight:700;color:#fff;line-height:1.7;text-shadow:0 3px 16px rgba(0,0,0,.4);letter-spacing:2px}
.mrs-account{font-size:36px;color:#c9a96e;margin-top:24px;letter-spacing:3px}
.mrs-bottom-num{position:absolute;bottom:56px;right:72px;font-size:26px;color:rgba(255,255,255,.4)}

@media(max-width:600px){
  .meigen-slides-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>

<header class="header">
<div class="container header-inner">
  <div class="logo">SNSオートパイロット<small>Instagram / TikTok / Pinterest 投稿自動生成</small></div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('generator')">コンテンツ生成</button>
    <button class="nav-tab" onclick="showSection('bulk')">一括生成</button>
    <button class="nav-tab" onclick="showSection('calendar')">カレンダー</button>
    <button class="nav-tab" onclick="showSection('meigen-slides')">TikTok名言</button>
  </nav>
</div>
</header>

<div class="container">

<!-- Stats -->
<div class="stats-bar" style="margin-top:24px">
  <div class="stat-card"><div class="stat-num" id="stat-templates">58</div><div class="stat-label">投稿テンプレート数</div></div>
  <div class="stat-card"><div class="stat-num">8</div><div class="stat-label">カテゴリ数</div></div>
  <div class="stat-card"><div class="stat-num">3</div><div class="stat-label">対応プラットフォーム</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-generated">0</div><div class="stat-label">生成済み投稿</div></div>
</div>

<!-- Ad -->
<div class="ad-space">
<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6327505164684489" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>try{(adsbygoogle = window.adsbygoogle || []).push({});}catch(e){}</script>
</div>

<!-- Section: Generator -->
<div class="section active" id="sec-generator">
  <div class="gen-controls">
    <div class="select-wrap">
      <select id="category-select">
        <option value="all">全カテゴリ</option>
        <option value="gift">ギフト情報</option>
        <option value="calorie">カロリー情報</option>
        <option value="recipe">料理レシピ</option>
        <option value="baby">赤ちゃん情報</option>
        <option value="kotowaza">ことわざ</option>
        <option value="yumeuranai">夢占い</option>
        <option value="mensetsu">面接対策</option>
        <option value="fukugyo">副業</option>
        <option value="meigen">💬 名言</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="generatePost()">コンテンツ生成</button>
    <button class="btn btn-secondary" onclick="clearPosts()">クリア</button>
  </div>
  <div id="posts-output" class="posts-grid"></div>
</div>

<!-- Section: Bulk -->
<div class="section" id="sec-bulk">
  <div class="gen-controls">
    <div class="select-wrap">
      <select id="bulk-count">
        <option value="7">7日分（1週間）</option>
        <option value="14">14日分（2週間）</option>
        <option value="30" selected>30日分（1ヶ月）</option>
      </select>
    </div>
    <button class="btn btn-pink" onclick="bulkGenerate()">一括生成</button>
    <button class="btn btn-secondary" onclick="exportCSV()">CSV出力</button>
    <button class="btn btn-secondary" onclick="clearBulk()">クリア</button>
  </div>
  <div id="bulk-output" class="posts-grid"></div>
</div>

<!-- Section: Calendar -->
<div class="section" id="sec-calendar">
  <div class="calendar-header">
    <button class="btn btn-sm btn-secondary" onclick="changeMonth(-1)">&lt; 前月</button>
    <div class="calendar-month" id="cal-month-label"></div>
    <button class="btn btn-sm btn-secondary" onclick="changeMonth(1)">翌月 &gt;</button>
  </div>
  <div class="calendar-grid" id="cal-grid"></div>
  <div style="margin-top:20px">
    <button class="btn btn-green" onclick="generateCalendar()">今月のカレンダー生成</button>
  </div>
  <div id="cal-detail" style="margin-top:20px"></div>
</div>

<!-- Section: TikTok Meigen Slides -->
<div class="section" id="sec-meigen-slides">
  <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent">TikTok名言スライド生成</h2>
  <p style="color:var(--text3);font-size:.85rem;margin-bottom:20px">TikTok名言動画用の12枚スライドセット（表紙＋名言10枚＋エンドカード）を自動生成します。Canva用プロンプト＆投稿文付き。</p>
  <div class="gen-controls">
    <div class="select-wrap">
      <select id="meigen-theme">
        <option value="人生">人生の名言</option>
        <option value="努力">努力の名言</option>
        <option value="恋愛">恋愛の名言</option>
        <option value="仕事">仕事の名言</option>
        <option value="夢">夢の名言</option>
        <option value="友情">友情の名言</option>
        <option value="勇気">勇気の名言</option>
        <option value="日本の偉人">日本の偉人の名言</option>
        <option value="経営者">経営者の名言</option>
        <option value="スポーツ選手">スポーツ選手の名言</option>
      </select>
    </div>
    <input type="text" id="meigen-account" placeholder="@アカウント名" value="@meigen_daily" style="background:var(--surface2);border:1px solid rgba(124,92,252,.2);color:var(--text);padding:10px 16px;border-radius:var(--radius-sm);font-size:.9rem;width:200px">
    <button class="btn btn-primary" onclick="generateMeigenSet(1)">スライドセット生成</button>
    <button class="btn btn-pink" onclick="generateMeigenSet(5)">5セット一括生成</button>
    <button class="btn btn-green" onclick="generateMeigenSet(10)">10セット一括生成</button>
    <button class="btn btn-secondary" onclick="document.getElementById('meigen-output').innerHTML=''">クリア</button>
  </div>
  <div id="meigen-output"></div>
</div>

</div><!-- container -->

<!-- Ad bottom -->
<div class="container">
<div class="ad-space" style="margin:30px 0">
<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6327505164684489" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>

</div>

<script>
// ==================== POST TEMPLATES (58 templates) ====================
const TEMPLATES = [

let generatedCount = 0;
let calendarData = {};
let currentMonth = new Date();

// ==================== FUNCTIONS ====================

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'calendar') renderCalendar();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました！'));
}

function getFilteredTemplates() {
  const cat = document.getElementById('category-select').value;
  return cat === 'all' ? TEMPLATES : TEMPLATES.filter(t => t.cat === cat);
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function createPostCardHTML(tpl, index) {
  const fullCaption = tpl.caption + '\n\n' + tpl.hashtags + '\n\n' + tpl.link;
  const cardId = 'card-' + Date.now() + '-' + index;

  return `
  <div class="post-card">
    <div class="post-card-inner">
      <div class="post-image-area">
        <div class="sns-card" id="${cardId}" style="width:100%;height:100%;min-height:320px">
          <div class="sns-card-bg" style="background:${tpl.gradient}"></div>
          <div class="sns-card-content">
            <div class="sns-card-emoji">${tpl.emoji}</div>
            <div class="sns-card-title">${tpl.title}</div>
            <div class="sns-card-subtitle">${tpl.brand}</div>
          </div>
          <div class="sns-card-brand">${tpl.brand}</div>
        </div>
      </div>
      <div class="post-content-area">
        <div class="post-platform">
          <span class="platform-badge badge-ig">Instagram</span>
          <span class="platform-badge badge-tt">TikTok</span>
          <span class="platform-badge badge-pin">Pinterest</span>
        </div>
        <div class="post-caption">${escapeHtml(tpl.caption)}</div>
        <div class="post-hashtags">${tpl.hashtags}</div>
        <div class="post-link">${tpl.link}</div>
        <div class="post-tiktok">
          <div class="post-tiktok-label">TikTok台本:</div>
          <div class="post-tiktok-script">${escapeHtml(tpl.tiktok)}</div>
        </div>
        <div class="post-actions">
          <button class="btn btn-sm btn-primary" onclick="copyText(\`${escapeJs(fullCaption)}\`)">キャプションをコピー</button>
          <button class="btn btn-sm btn-secondary" onclick="copyText(\`${escapeJs(tpl.hashtags)}\`)">ハッシュタグをコピー</button>
          <button class="btn btn-sm btn-secondary" onclick="copyText(\`${escapeJs(tpl.tiktok)}\`)">TikTok台本をコピー</button>
        </div>
      </div>
    </div>
  </div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeJs(str) {
  return str.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
}

function generatePost() {
  const templates = getFilteredTemplates();
  if (!templates.length) { showToast('テンプレートがありません'); return; }
  const tpl = pickRandom(templates);
  const output = document.getElementById('posts-output');
  output.insertAdjacentHTML('afterbegin', createPostCardHTML(tpl, generatedCount));
  generatedCount++;
  document.getElementById('stat-generated').textContent = generatedCount;
  showToast('投稿を生成しました！');
}

function clearPosts() {
  document.getElementById('posts-output').innerHTML = '';
}

function bulkGenerate() {
  const count = parseInt(document.getElementById('bulk-count').value);
  const output = document.getElementById('bulk-output');
  output.innerHTML = '';

  // Distribute categories evenly
  const cats = ['gift','calorie','recipe','baby','kotowaza','yumeuranai','mensetsu','fukugyo'];
  let html = '';
  const usedIndices = new Set();

  for (let i = 0; i < count; i++) {
    const cat = cats[i % cats.length];
    const catTemplates = TEMPLATES.filter(t => t.cat === cat);
    let tpl;
    // Try to avoid duplicates
    let attempts = 0;
    do {
      tpl = pickRandom(catTemplates);
      attempts++;
    } while (usedIndices.has(TEMPLATES.indexOf(tpl)) && attempts < 10);
    usedIndices.add(TEMPLATES.indexOf(tpl));

    html += `<div style="position:relative"><div style="position:absolute;top:12px;left:12px;background:var(--accent);color:#fff;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600;z-index:2">Day ${i+1}</div>${createPostCardHTML(tpl, generatedCount + i)}</div>`;
  }
  output.innerHTML = html;
  generatedCount += count;
  document.getElementById('stat-generated').textContent = generatedCount;
  showToast(`${count}件の投稿を生成しました！`);
}

function clearBulk() {
  document.getElementById('bulk-output').innerHTML = '';
}

function exportCSV() {
  const output = document.getElementById('bulk-output');
  if (!output.children.length) { showToast('先に一括生成してください'); return; }

  let csv = '\uFEFF日付,カテゴリ,タイトル,キャプション,ハッシュタグ,TikTok台本,リンク\n';
  const cards = output.querySelectorAll('.post-card');
  const today = new Date();

  cards.forEach((card, i) => {
    const date = new Date(today);
    date.setDate(date.getDate() + i);
    const dateStr = date.toISOString().split('T')[0];
    const title = card.querySelector('.sns-card-title')?.textContent || '';
    const caption = card.querySelector('.post-caption')?.textContent || '';
    const hashtags = card.querySelector('.post-hashtags')?.textContent || '';
    const tiktok = card.querySelector('.post-tiktok-script')?.textContent || '';
    const link = card.querySelector('.post-link')?.textContent || '';

    csv += `"${dateStr}","","${csvEscape(title)}","${csvEscape(caption)}","${csvEscape(hashtags)}","${csvEscape(tiktok)}","${link}"\n`;
  });

  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sns-posts-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  showToast('CSVをダウンロードしました');
}

function csvEscape(str) {
  return str.replace(/"/g, '""').replace(/\n/g, ' ');
}

// ==================== CALENDAR ====================

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  renderCalendar();
}

function generateCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cats = ['gift','calorie','recipe','baby','kotowaza','yumeuranai','mensetsu','fukugyo'];
  const platforms = ['ig','tt','pin'];
  const key = `${year}-${month}`;
  calendarData[key] = {};

  for (let d = 1; d <= daysInMonth; d++) {
    const cat = cats[(d - 1) % cats.length];
    const platform = platforms[(d - 1) % platforms.length];
    const catTemplates = TEMPLATES.filter(t => t.cat === cat);
    const tpl = catTemplates[(d - 1) % catTemplates.length];
    calendarData[key][d] = { ...tpl, platform };
  }
  renderCalendar();
  showToast('カレンダーを生成しました！');
}

function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const label = `${year}年${month + 1}月`;
  document.getElementById('cal-month-label').textContent = label;

  const grid = document.getElementById('cal-grid');
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const key = `${year}-${month}`;
  const data = calendarData[key] || {};

  const dayNames = ['日','月','火','水','木','金','土'];
  let html = dayNames.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const post = data[d];
    html += `<div class="cal-day" onclick="showCalDetail(${d})">
      <div class="cal-day-num">${d}</div>`;
    if (post) {
      const platformClass = post.platform === 'ig' ? 'cal-badge-ig' : post.platform === 'tt' ? 'cal-badge-tt' : 'cal-badge-pin';
      const platformLabel = post.platform === 'ig' ? 'IG' : post.platform === 'tt' ? 'TT' : 'Pi';
      html += `<div class="cal-day-platform"><span class="cal-badge ${platformClass}">${platformLabel}</span></div>
        <div class="cal-day-post">${post.emoji} ${post.title}</div>`;
    }
    html += '</div>';
  }
  grid.innerHTML = html;
}

{text:"吾輩は猫である。名前はまだ無い。",person:"夏目漱石",theme:["日本の偉人","人生"]},

{text:"芸術は爆発だ。",person:"岡本太郎",theme:["日本の偉人"]},

function buildRenderSlide(bg, numText, contentHTML) {
  return `<div class="meigen-render-slide" style="background:${bg}">
    <div class="mrs-border"></div>
    <div class="mrs-sparkle s1">\u2726</div><div class="mrs-sparkle s2">\u2726</div>
    <div class="mrs-sparkle s3">\u2726</div><div class="mrs-sparkle s4">\u2726</div>
    <div class="mrs-sparkle s5">\u2727</div><div class="mrs-sparkle s6">\u2727</div>
    <div class="mrs-num">${numText}</div>
    ${contentHTML}
  </div>`;
}

function toggleIndividualDl(setId) {
  const el = document.getElementById('indiv-' + setId);
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

async function renderSlideToBlob(slideEl) {
  const canvas = await html2canvas(slideEl, {
    width: 1080, height: 1920, scale: 1,
    useCORS: true, backgroundColor: null,
    logging: false
  });
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

async function downloadMeigenZip(renderId, progressId, theme) {
  const container = document.getElementById(renderId);
  const slides = container.querySelectorAll('.meigen-render-slide');
  const progressEl = document.getElementById(progressId);
  progressEl.style.display = 'inline';
  const zip = new JSZip();
  const names = ['01_title'];
  for (let i = 1; i <= 10; i++) names.push(String(i+1).padStart(2,'0') + '_quote' + i);
  names.push('12_cta');

  for (let i = 0; i < slides.length; i++) {
    progressEl.textContent = `\u753b\u50cf\u751f\u6210\u4e2d... ${i+1}/${slides.length}`;
    const blob = await renderSlideToBlob(slides[i]);
    zip.file(`slide_${names[i]}.png`, blob);
  }
  progressEl.textContent = 'ZIP\u4f5c\u6210\u4e2d...';
  const zipBlob = await zip.generateAsync({type:'blob'});
  saveAs(zipBlob, `meigen_${theme}_slides.zip`);
  progressEl.textContent = '\u2705 \u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u5b8c\u4e86\uff01';
  setTimeout(() => { progressEl.style.display = 'none'; }, 3000);
}

async function downloadSingleSlide(renderId, index, name) {
  const container = document.getElementById(renderId);
  const slide = container.querySelectorAll('.meigen-render-slide')[index];
  if (!slide) return;
  const blob = await renderSlideToBlob(slide);
  saveAs(blob, `slide_${String(index+1).padStart(2,'0')}_${name}.png`);
}

function getMeigenQuotes(theme, count) {
  const pool = MEIGEN_QUOTES.filter(q => q.theme.includes(theme));
  const result = [];
  const used = new Set();
  for (let i = 0; i < count && i < pool.length; i++) {
    let idx;
    let attempts = 0;
    do {
      idx = Math.floor(Math.random() * pool.length);
      attempts++;
    } while (used.has(idx) && attempts < 50);
    used.add(idx);
    result.push(pool[idx]);
  }
  return result;
}
