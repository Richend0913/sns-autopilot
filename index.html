:root{

body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:0 20px}

.logo small{font-size:.7rem;display:block;-webkit-text-fill-color:var(--text3);font-weight:400}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 20px;border-radius:20px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:.85rem;transition:all .2s}
.nav-tab:hover{background:var(--surface2);color:var(--text)}
.nav-tab.active{background:var(--accent);color:#fff}

/* Sections */
.section{display:none;padding:30px 0}
.section.active{display:block}

/* Generator Section */
.gen-controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.select-wrap{position:relative}
.select-wrap select{appearance:none;background:var(--surface2);border:1px solid rgba(124,92,252,.2);color:var(--text);padding:10px 40px 10px 16px;border-radius:var(--radius-sm);font-size:.9rem;cursor:pointer;min-width:200px}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.btn{padding:10px 24px;border-radius:var(--radius-sm);border:none;font-size:.9rem;cursor:pointer;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6246ea);color:#fff;box-shadow:0 4px 16px rgba(124,92,252,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,92,252,.4)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid rgba(124,92,252,.2)}
.btn-secondary:hover{background:var(--surface3)}
.btn-pink{background:linear-gradient(135deg,var(--pink),#e11d48);color:#fff}
.btn-green{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.btn-sm{padding:6px 14px;font-size:.8rem}

/* Post Cards */
.posts-grid{display:grid;gap:20px}
.post-card{background:var(--surface);border:1px solid rgba(124,92,252,.1);border-radius:var(--radius);overflow:hidden;transition:all .2s}
.post-card:hover{border-color:rgba(124,92,252,.3);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.post-card-inner{display:grid;grid-template-columns:320px 1fr;gap:0}
@media(max-width:768px){.post-card-inner{grid-template-columns:1fr}}
.post-image-area{background:var(--surface2);min-height:320px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.post-content-area{padding:20px;display:flex;flex-direction:column;gap:12px}
.post-platform{display:flex;gap:6px;align-items:center}
.platform-badge{padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600}
.badge-ig{background:linear-gradient(135deg,#833AB4,#E1306C,#F77737);color:#fff}
.badge-tt{background:#000;color:#fff;border:1px solid #333}
.badge-pin{background:#e60023;color:#fff}
.post-caption{font-size:.9rem;color:var(--text);line-height:1.8;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.post-hashtags{font-size:.8rem;color:var(--accent2);line-height:1.8}
.post-link{font-size:.8rem;color:var(--blue);word-break:break-all}
.post-actions{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap}
.post-tiktok{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-top:8px}
.post-tiktok-label{font-size:.75rem;color:var(--text3);margin-bottom:4px}
.post-tiktok-script{font-size:.85rem;color:var(--text2);line-height:1.8}

/* Image Card (screenshot-ready) */
.sns-card{width:320px;height:320px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px;text-align:center;position:relative;overflow:hidden}
.sns-card-bg{position:absolute;inset:0;z-index:0}
.sns-card-content{position:relative;z-index:1}
.sns-card-emoji{font-size:3rem;margin-bottom:16px}
.sns-card-title{font-size:1.3rem;font-weight:700;color:#fff;line-height:1.6;margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.sns-card-subtitle{font-size:.85rem;color:rgba(255,255,255,.8);line-height:1.6}
.sns-card-brand{position:absolute;bottom:12px;right:16px;font-size:.65rem;color:rgba(255,255,255,.5);z-index:1}

/* Calendar Section */
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.calendar-month{font-size:1.2rem;font-weight:600}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-header{text-align:center;font-size:.75rem;color:var(--text3);padding:8px}
.cal-day{background:var(--surface);border:1px solid rgba(124,92,252,.08);border-radius:var(--radius-sm);padding:8px;min-height:100px;cursor:pointer;transition:all .2s}

.cal-day.empty{background:transparent;border-color:transparent}
.cal-day-num{font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.cal-day-post{font-size:.7rem;color:var(--text3);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.cal-day-platform{margin-top:4px}
.cal-badge{display:inline-block;width:18px;height:18px;border-radius:50%;font-size:.55rem;line-height:18px;text-align:center;color:#fff;font-weight:700}
.cal-badge-ig{background:linear-gradient(135deg,#833AB4,#E1306C)}
.cal-badge-tt{background:#000;border:1px solid #444}
.cal-badge-pin{background:#e60023}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:#000;padding:12px 28px;border-radius:var(--radius);font-size:.9rem;font-weight:600;transition:transform .3s ease;z-index:1000}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Stats bar */
.stats-bar{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid rgba(124,92,252,.1);border-radius:var(--radius-sm);padding:16px 24px;flex:1;min-width:150px}
.stat-num{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.75rem;color:var(--text3);margin-top:2px}

/* Ad space */
.ad-space{margin:20px 0;text-align:center;min-height:90px}

/* Responsive */
@media(max-width:600px){
  .header-inner{flex-direction:column;gap:12px}
  .gen-controls{flex-direction:column}
  .select-wrap select{width:100%}
  .calendar-grid{grid-template-columns:repeat(7,1fr)}
  .cal-day{min-height:60px;padding:4px}
  .cal-day-post{display:none}
  .stats-bar{flex-direction:column}

</style>
</head>

let generatedCount = 0;
let calendarData = {};

// ==================== FUNCTIONS ====================

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'calendar') renderCalendar();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました！'));
}

function getFilteredTemplates() {
  const cat = document.getElementById('category-select').value;
  return cat === 'all' ? TEMPLATES : TEMPLATES.filter(t => t.cat === cat);
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function createPostCardHTML(tpl, index) {
  const fullCaption = tpl.caption + '\n\n' + tpl.hashtags + '\n\n' + tpl.link;
  const cardId = 'card-' + Date.now() + '-' + index;

  return `
  <div class="post-card">
    <div class="post-card-inner">
      <div class="post-image-area">
        <div class="sns-card" id="${cardId}" style="width:100%;height:100%;min-height:320px">
          <div class="sns-card-bg" style="background:${tpl.gradient}"></div>
          <div class="sns-card-content">
            <div class="sns-card-emoji">${tpl.emoji}</div>
            <div class="sns-card-title">${tpl.title}</div>
            <div class="sns-card-subtitle">${tpl.brand}</div>
          </div>
          <div class="sns-card-brand">${tpl.brand}</div>
        </div>
      </div>
      <div class="post-content-area">
        <div class="post-platform">
          <span class="platform-badge badge-ig">Instagram</span>
          <span class="platform-badge badge-tt">TikTok</span>
          <span class="platform-badge badge-pin">Pinterest</span>
        </div>
        <div class="post-caption">${escapeHtml(tpl.caption)}</div>
        <div class="post-hashtags">${tpl.hashtags}</div>
        <div class="post-link">${tpl.link}</div>
        <div class="post-tiktok">
          <div class="post-tiktok-label">TikTok台本:</div>
          <div class="post-tiktok-script">${escapeHtml(tpl.tiktok)}</div>
        </div>
        <div class="post-actions">
          <button class="btn btn-sm btn-primary" onclick="copyText(\`${escapeJs(fullCaption)}\`)">キャプションをコピー</button>
          <button class="btn btn-sm btn-secondary" onclick="copyText(\`${escapeJs(tpl.hashtags)}\`)">ハッシュタグをコピー</button>
          <button class="btn btn-sm btn-secondary" onclick="copyText(\`${escapeJs(tpl.tiktok)}\`)">TikTok台本をコピー</button>
        </div>
      </div>
    </div>
  </div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeJs(str) {
  return str.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
}

function generatePost() {
  const templates = getFilteredTemplates();
  if (!templates.length) { showToast('テンプレートがありません'); return; }
  const tpl = pickRandom(templates);
  const output = document.getElementById('posts-output');
  output.insertAdjacentHTML('afterbegin', createPostCardHTML(tpl, generatedCount));
  generatedCount++;
  document.getElementById('stat-generated').textContent = generatedCount;
  showToast('投稿を生成しました！');
}

function clearPosts() {
  document.getElementById('posts-output').innerHTML = '';
}

function bulkGenerate() {
  const count = parseInt(document.getElementById('bulk-count').value);
  const output = document.getElementById('bulk-output');
  output.innerHTML = '';

  // Distribute categories evenly
  const cats = ['gift','calorie','recipe','baby','kotowaza','yumeuranai','mensetsu','fukugyo'];
  let html = '';
  const usedIndices = new Set();

  for (let i = 0; i < count; i++) {
    const cat = cats[i % cats.length];
    const catTemplates = TEMPLATES.filter(t => t.cat === cat);
    let tpl;
    // Try to avoid duplicates
    let attempts = 0;
    do {
      tpl = pickRandom(catTemplates);
      attempts++;
    } while (usedIndices.has(TEMPLATES.indexOf(tpl)) && attempts < 10);
    usedIndices.add(TEMPLATES.indexOf(tpl));

    html += `<div style="position:relative"><div style="position:absolute;top:12px;left:12px;background:var(--accent);color:#fff;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600;z-index:2">Day ${i+1}</div>${createPostCardHTML(tpl, generatedCount + i)}</div>`;
  }
  output.innerHTML = html;
  generatedCount += count;
  document.getElementById('stat-generated').textContent = generatedCount;
  showToast(`${count}件の投稿を生成しました！`);
}

function clearBulk() {
  document.getElementById('bulk-output').innerHTML = '';
}

function exportCSV() {
  const output = document.getElementById('bulk-output');
  if (!output.children.length) { showToast('先に一括生成してください'); return; }

  let csv = '\uFEFF日付,カテゴリ,タイトル,キャプション,ハッシュタグ,TikTok台本,リンク\n';
  const cards = output.querySelectorAll('.post-card');
  const today = new Date();

  cards.forEach((card, i) => {
    const date = new Date(today);
    date.setDate(date.getDate() + i);
    const dateStr = date.toISOString().split('T')[0];
    const title = card.querySelector('.sns-card-title')?.textContent || '';
    const caption = card.querySelector('.post-caption')?.textContent || '';
    const hashtags = card.querySelector('.post-hashtags')?.textContent || '';
    const tiktok = card.querySelector('.post-tiktok-script')?.textContent || '';
    const link = card.querySelector('.post-link')?.textContent || '';

    csv += `"${dateStr}","","${csvEscape(title)}","${csvEscape(caption)}","${csvEscape(hashtags)}","${csvEscape(tiktok)}","${link}"\n`;
  });

  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sns-posts-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  showToast('CSVをダウンロードしました');
}

function csvEscape(str) {
  return str.replace(/"/g, '""').replace(/\n/g, ' ');
}

// ==================== CALENDAR ====================

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  renderCalendar();
}

function generateCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cats = ['gift','calorie','recipe','baby','kotowaza','yumeuranai','mensetsu','fukugyo'];
  const platforms = ['ig','tt','pin'];
  const key = `${year}-${month}`;
  calendarData[key] = {};

  for (let d = 1; d <= daysInMonth; d++) {
    const cat = cats[(d - 1) % cats.length];
    const platform = platforms[(d - 1) % platforms.length];
    const catTemplates = TEMPLATES.filter(t => t.cat === cat);
    const tpl = catTemplates[(d - 1) % catTemplates.length];
    calendarData[key][d] = { ...tpl, platform };
  }
  renderCalendar();
  showToast('カレンダーを生成しました！');
}

function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const label = `${year}年${month + 1}月`;
  document.getElementById('cal-month-label').textContent = label;

  const grid = document.getElementById('cal-grid');
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const key = `${year}-${month}`;
  const data = calendarData[key] || {};

  const dayNames = ['日','月','火','水','木','金','土'];
  let html = dayNames.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const post = data[d];
    html += `<div class="cal-day" onclick="showCalDetail(${d})">
      <div class="cal-day-num">${d}</div>`;
    if (post) {
      const platformClass = post.platform === 'ig' ? 'cal-badge-ig' : post.platform === 'tt' ? 'cal-badge-tt' : 'cal-badge-pin';
      const platformLabel = post.platform === 'ig' ? 'IG' : post.platform === 'tt' ? 'TT' : 'Pi';
      html += `<div class="cal-day-platform"><span class="cal-badge ${platformClass}">${platformLabel}</span></div>
        <div class="cal-day-post">${post.emoji} ${post.title}</div>`;
    }
    html += '</div>';
  }
  grid.innerHTML = html;
}

function showCalDetail(day) {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const key = `${year}-${month}`;
  const post = calendarData[key]?.[day];
  const detail = document.getElementById('cal-detail');

  if (!post) {
    detail.innerHTML = '<p style="color:var(--text3)">この日の投稿はまだ生成されていません。「今月のカレンダー生成」ボタンを押してください。</p>';
    return;
  }

  const fullCaption = post.caption + '\n\n' + post.hashtags + '\n\n' + post.link;
  detail.innerHTML = `
    <div class="post-card">
      <div class="post-card-inner">
        <div class="post-image-area">
          <div class="sns-card" style="width:100%;height:100%;min-height:320px">
            <div class="sns-card-bg" style="background:${post.gradient}"></div>
            <div class="sns-card-content">
              <div class="sns-card-emoji">${post.emoji}</div>
              <div class="sns-card-title">${post.title}</div>
              <div class="sns-card-subtitle">${month+1}月${day}日の投稿</div>
            </div>
            <div class="sns-card-brand">${post.brand}</div>
          </div>
        </div>
        <div class="post-content-area">
          <div class="post-platform">
            <span class="platform-badge badge-${post.platform === 'ig' ? 'ig' : post.platform === 'tt' ? 'tt' : 'pin'}">${post.platform === 'ig' ? 'Instagram' : post.platform === 'tt' ? 'TikTok' : 'Pinterest'}</span>
          </div>
          <div class="post-caption">${escapeHtml(post.caption)}</div>
          <div class="post-hashtags">${post.hashtags}</div>
          <div class="post-link">${post.link}</div>
          <div class="post-tiktok">
            <div class="post-tiktok-label">TikTok台本:</div>
            <div class="post-tiktok-script">${escapeHtml(post.tiktok)}</div>
          </div>
          <div class="post-actions">
            <button class="btn btn-sm btn-primary" onclick="copyText(\`${escapeJs(fullCaption)}\`)">キャプションをコピー</button>
            <button class="btn btn-sm btn-secondary" onclick="copyText(\`${escapeJs(post.hashtags)}\`)">ハッシュタグをコピー</button>
            <button class="btn btn-sm btn-secondary" onclick="copyText(\`${escapeJs(post.tiktok)}\`)">TikTok台本をコピー</button>
          </div>
        </div>
      </div>
    </div>`;
}

// Init
document.getElementById('stat-templates').textContent = TEMPLATES.length;
renderCalendar();
